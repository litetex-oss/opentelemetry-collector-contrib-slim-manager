name: Update repo

on:
  schedule:
    - cron: '5 5 * * *'
  workflow_dispatch:
    inputs:
      tag:
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      
      - name: Update
        run: |
          if [[ -z "${{ inputs.tag }}" ]]; then
            tag=$(curl -s -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/repos/open-telemetry/opentelemetry-collector-contrib/releases/latest \
              | jq -r '.tag_name')
          else
            tag="${{ inputs.tag }}"
          fi

          if curl --fail -s -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              https://api.github.com/repos/litetex-oss/opentelemetry-collector-contrib-slim/branches/release-$tag > /dev/null; then
            echo "Branch already exists; Aborting"
            exit 0
          fi

          git clone --branch "$tag" https://github.com/open-telemetry/opentelemetry-collector-contrib.git

          git config --global user.email "164098849+litetex-oss-bot@users.noreply.github.com"
          git config --global user.name "litetex-oss-bot"
          
          cd opentelemetry-collector-contrib
          git switch -c release-$tag

          rm -rf .github
          git commit -a -m "Deleted .github folder"

          rm -f receiver/prometheusreceiver/config_test.go
          git commit -a -m "Deleted receiver/prometheusreceiver/config_test.go"

          rm -f receiver/prometheusreceiver/factory_test.go
          rm -f receiver/prometheusreceiver/metricsreceiver_api_server_test.go
          git commit -a -m "[receiver/prometheusreceiver] Delete tests that require API server"

          git apply ../remove-prometheus-bloatware.patch
          git commit -a -m "Removed prometheus bloatware (k8s and api server)"

          mkdir -p .github/workflows
          curl --fail -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://raw.githubusercontent.com/litetex-oss/opentelemetry-collector-contrib-slim/refs/heads/master/.github/workflows/build-and-tag.yml \
            > .github/workflows/build-and-tag.yml
          git add -A
          git commit -a -m "Add workflow"

          git remote add slim https://litetex-oss-bot:${{ secrets.PUSH_PAT }}@github.com/litetex-oss/opentelemetry-collector-contrib-slim.git
          git push --set-upstream slim -u release-$tag
